<!DOCTYPE html>
<html>
    <body>
        <div id = "root"></div>
    </body>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const root = document.getElementById("root");

        // 구식 방식
        // React.createElement(태그, 속성, 메세지 or 자식 노드)
        const h3 = React.createElement("h3", {
            id:"asdf", style:{color:"red"},
            onMouseEnter: () => console.log("mouse enter"),
        }, "hahaha");
        const btn = React.createElement("button", {
            onClick: () => console.log("clicked")
        }, "Click me");

        // JSX 사용
        const Title = (<h3 id = "title" onMouseEnter = {() => console.log("mouse enter")}>Title</h3>);
        const Btn = (
            <button style = {{backgroundColor:"tomato"}} onClick = {()=>console.log("jsx clicked!!")}>
                "Click me!!!"
            </button>
        );
        const container = React.createElement("div", null, [Title,h3,btn,Btn]);

        // JSX 사용 -> 함수로
        const Title2 = () => (<h3 id = "title" color="red" onMouseEnter = {() => console.log("mouse enter")}>Title</h3>);
        const Btn2 = () => (
            <button style = {{backgroundColor:"green"}} onClick = {()=>console.log("jsx clicked!!")}>
                "Click me!!!"
            </button>
        );
        const Container = () => (
        <div>
            <Title2 />
            <Btn2 />
        </div>
        );


        // ReactDOM.render(container, root);
        ReactDOM.render(<Container />, root);
    </script>

</html>
